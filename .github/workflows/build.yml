name: Build DocSuite Master Edition

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # لاحظ إضافة PyPDF2 و pdfplumber و openpyxl لضمان شغل الإكسل
        pip install customtkinter img2pdf pdf2image pandas openpyxl pdfplumber pytesseract pillow PyPDF2 pyinstaller

    - name: Build EXE (The Fast Way)
      run: |
        # استخدمنا --onedir عشان يفتح "طلقة" على الويندوز
        # واستخدمنا --collect-all customtkinter عشان الألوان تظهر صح
        pyinstaller --noconsole --onedir --collect-all customtkinter --icon=NONE --name "DocSuite_Pro" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DocSuite_Windows_Package
        path: dist/DocSuite_Pro/
