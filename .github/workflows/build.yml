name: Build DocSuite Pro 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت كل المكتبات اللازمة لعمل الكود والتحويل
        pip install customtkinter img2pdf pandas openpyxl pdfplumber pytesseract pillow pyinstaller pymupdf pypdf arabic-reshaper python-bidi reportlab

    - name: Build EXE (Ultimate Edition)
      run: |
        # --onefile: لضغط البرنامج في ملف واحد
        # --noconsole: لإخفاء نافذة التيرمينال عند التشغيل
        # --collect-all: لضمان ظهور ثيمات customtkinter بشكل صحيح
        # --icon: لدمج أيقونتك الخاصة بالبرنامج
        pyinstaller --noconsole --onefile --collect-all customtkinter --icon="app_icon.ico" --name "DocSuite_Pro_2026" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DocSuite_Pro_2026_EXE
        path: dist/DocSuite_Pro_2026.exe
