name: Build Windows EXE

on:
  push:
    branches: [ main ] # أو اسم البرانش بتاعك (master مثلاً)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "DocMaster_2026" --collect-all customtkinter test.py
      # ملاحظة: تأكد إن اسم ملف الكود بتاعك هو test.py زي ما هو مكتوب فوق

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DocMaster-Windows-EXE
        path: dist/DocMaster_2026.exe
